# Mouse Buttons,keys
# -------------------------------------------------------------------------
MBTN_LEFT  	cycle pause; script-binding uosc/flash-pause-indicator
MBTN_LEFT_DBL 	cycle fullscreen  
MBTN_RIGHT	script-binding uosc/menu
MBTN_BACK     	ignore      	
MBTN_FORWARD  	ignore      
Ctrl+MBTN_LEFT 	ignore	
# -------------------------------------------------------------------------



# Arrow Keys
# -------------------------------------------------------------------------
RIGHT 		seek  5                          
LEFT  		seek -5 
UP    		seek  60                         
DOWN  		seek -60                         
Shift+RIGHT 	no-osd seek  1 exact       
Shift+LEFT  	no-osd seek -1 exact       
Shift+UP    	no-osd seek  5 exact       
Shift+DOWN  	no-osd seek -5 exact       
Ctrl+LEFT   	ignore
Ctrl+RIGHT  	ignore
# -------------------------------------------------------------------------



# Mouse Wheel + keys
# ------------------------------------------------------------------------
WHEEL_UP      	add volume 5
WHEEL_DOWN    	add volume -5
WHEEL_LEFT    	seek -10
WHEEL_RIGHT   	seek 10
Ctrl+WHEEL_UP   script-binding positioning/cursor-centric-zoom  0.1 # zoom in towards the cursor
Ctrl+WHEEL_DOWN script-binding positioning/cursor-centric-zoom -0.1 # zoom out towards the cursor
# -------------------------------------------------------------------------



# Basic Functions
# -------------------------------------------------------------------------
q 	quit
ctrl+d 	quit
? 	stop                           # stop playback (quit or enter idle mode)
Q 	quit-watch-later               # exit & remember the playback position
ESC 	set fullscreen no              # leave fullscreen
SPACE 	cycle pause                    # toggle pause/playback 
o 	show-progress                  # show playback progress
m 	cycle mute                     # toggle mute
A 	cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "no" # cycle the video aspect ratio
_ 	cycle video                    # switch video track
T 	cycle ontop                    # toggle placing the video on top of other windows
f 	cycle fullscreen               # toggle fullscreen
P 	show-progress                  # show playback progress
; 	playlist-next                  # skip to the next file
, 	playlist-prev                  # skip to the previous file
# -------------------------------------------------------------------------



# subtitle Related
# -------------------------------------------------------------------------
j 	cycle sub                      # switch subtitle track
v 	cycle sub-visibility           # hide or show the subtitles
G 	add sub-scale 0.1              # increase the subtitle font size
F 	add sub-scale -0.1              # decrease the subtitle font size
r 	add sub-pos -1                 # move subtitles up
t 	add sub-pos +1                 # move subtitles down
< 	sub-step -1            	       # change subtitle timing such that the previous subtitle is displayed
> 	sub-step 1            	       # change subtitle timing such that the next subtitle is displayed
z 	add sub-delay -0.1             # shift subtitles 100 ms earlier
Z 	add sub-delay                  # delay subtitles by 100 ms
x 	add sub-delay +0.1             # delay subtitles by 100 ms
V 	cycle sub-ass-use-video-data   # cycle which video data gets used in ASS rendering to fix broken files
u 	cycle-values sub-ass-override "force" "scale" # toggle overriding SSA/ASS subtitle styles with the normal styles
# -------------------------------------------------------------------------


# Audio Related
# -------------------------------------------------------------------------
SHARP 	cycle audio                    # switch audio track('#' key)
BS 	set speed 1.0                  # reset the speed to normal
[ 	multiply speed 1/1.1           # decrease the playback speed
] 	multiply speed 1.1             # increase the playback speed
{ 	multiply speed 0.5             # halve the playback speed
} 	multiply speed 2.0             # double the playback speed
ctrl++ 	add audio-delay  0.100         # change audio/video sync by delaying the audio
ctrl+- 	add audio-delay -0.100         # change audio/video sync by shifting the audio earlier
# -------------------------------------------------------------------------



# Frame by frame movement 
# -------------------------------------------------------------------------
. 	frame-step                     # advance one frame and pause
, 	frame-back-step                # go back by one frame and pause
@ 	add chapter 1                  # seek to the next chapter
! 	add chapter -1                 # seek to the previous chapter
# -------------------------------------------------------------------------



# Zooming & Panning 
# -------------------------------------------------------------------------
=     		add video-zoom   0.1        # zoom in
- 		add video-zoom  -0.1        # zoom out
Ctrl+left  	add video-pan-x  0.1        # move the video right
Ctrl+right 	add video-pan-x -0.1        # move the video left
Ctrl+up    	add video-pan-y  0.1        # move the video down
Ctrl+down  	add video-pan-y -0.1        # move the video up
w 		add panscan -0.1            # decrease panscan
e 		add panscan +0.1            # shrink black bars by cropping the video
Alt+BS 		set video-zoom 0; no-osd set panscan 0; no-osd set video-pan-x 0; no-osd set video-pan-y 0; no-osd set video-align-x 0; no-osd set video-align-y 0 # reset zoom and pan settings
# -------------------------------------------------------------------------



# Others 
# -------------------------------------------------------------------------
E 		cycle edition                       	# switch edition
d 		cycle deinterlace           		# cycle the deinterlacing filter
l 		ab-loop                     		# set/clear A-B loop points
ctrl+c 		quit 4
L 		cycle-values loop-file "inf" "no"  	# toggle infinite looping
ctrl+h 		cycle-values hwdec "no" "auto"  	# toggle hardware decoding
O 		no-osd cycle-values osd-level 3 1   	# toggle displaying the OSD on user interaction or always
Ctrl+v 		loadfile ${clipboard/text} append-play; show-text '+ ${clipboard/text}' # append the copied path
# -------------------------------------------------------------------------



# screenshot
# -------------------------------------------------------------------------
s 		screenshot                # take a screenshot of the video in its original resolution with sub
S 		screenshot video          # take a screenshot of the video in its original resolution without sub
Ctrl+s 		screenshot window         # take a screenshot of the window with OSD and sub
Ctrl+Shift+s 	screenshot each-frame     # automatically screenshot every frame; press command again to stop taking screenshots
# -------------------------------------------------------------------------



# Script Binds
# -------------------------------------------------------------------------
Ctrl+p 		script-binding uosc/menu
a 		script-binding uosc/audio
c 		script-binding uosc/subtitles
p    		script-binding uosc/playlist
Ctrl+c 		script-binding uosc/chapters             
Ctrl+e 		script-binding uosc/open-file           
tab  		script-binding uosc/toggle-ui
b		script-binding uosc/keybinds
# -------------------------------------------------------------------------



# Adjust contrast, brightness, gamma, saturation 
# -------------------------------------------------------------------------
1 		add contrast -1
2 		add contrast 1
3 		add brightness -1
4 		add brightness 1
5 		add gamma -1
6 		add gamma 1
7 		add saturation -1
8 		add saturation 1
